services:
  - type: web
    name: afet-yolu-backend
    env: go
    region: frankfurt
    plan: free
    buildCommand: go build -o main ./cmd/main.go
    startCommand: ./main
    envVars:
      - key: PORT
        value: 8080
      - key: APP_ENV
        value: production
      - key: MAPILLARY_ACCESS_TOKEN
        sync: false
      - key: WIRO_API_KEY
        sync: false
      - key: WIRO_SECRET
        sync: false
    healthCheckPath: /health
